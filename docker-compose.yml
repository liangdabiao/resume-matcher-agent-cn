services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: hr-critique-backend:latest
    container_name: hr-critique-backend
    restart: unless-stopped
    env_file:
      - path: apps/backend/.env
        required: false  # 新 clone 时如未 cp .env.sample .env，仍可启动
    environment:
      # 默认 local，保证无 .env 也能启动；配置好 .env 后由 env_file 覆盖为 production。
      # 若 .env 里写了 ENV=production，则以 .env 为准（要求配好 LLM_API_KEY/SESSION_SECRET_KEY）。
      ENV: local
      LOG_DIR: /app/logs
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    healthcheck:
      # 用 Python 做健康检查（python:slim 镜像必然有 python，但没装 curl）。
      # 避免因 curl 缺失导致容器显示 unhealthy。
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/ping',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        BACKEND_INTERNAL_URL: http://backend:8000
    image: hr-critique-frontend:latest
    container_name: hr-critique-frontend
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  backend-data:
  backend-logs:

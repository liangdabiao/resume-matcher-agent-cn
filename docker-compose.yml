services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: hr-critique-backend:latest
    container_name: hr-critique-backend
    restart: unless-stopped
    env_file:
      - apps/backend/.env
    environment:
      ENV: production
      SYNC_DATABASE_URL: sqlite:////app/data/app.db
      ASYNC_DATABASE_URL: sqlite+aiosqlite:////app/data/app.db
      LOG_DIR: /app/logs
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        BACKEND_INTERNAL_URL: http://backend:8000
    image: hr-critique-frontend:latest
    container_name: hr-critique-frontend
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  backend-data:
  backend-logs:
